<?xml version="1.0" encoding="UTF-8"?>
<!--
  hud-banner.svg  -  hand-written robotics HUD banner for yusenthebot.
  Pure inline SVG + SMIL/CSS. No external fonts, images, or scripts (camo-safe).
  System monospace stack only. Self-contained dark panel so it reads on both
  GitHub dark and light themes.
  Elements: lidar sweep + returns, quadruped trot (diagonal pairs in antiphase),
  NL -> plan -> control pipeline, telemetry bar, joint-state ticker, scanlines.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240"
     font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace"
     role="img" aria-label="Robotics HUD: lidar sweep, quadruped gait, natural-language to control pipeline">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#060a10"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(120 130) scale(86)">
      <stop offset="0" stop-color="#00ff9c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00ff9c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="radarClip"><circle cx="120" cy="130" r="84"/></clipPath>
    <style>
      .ink   { fill: #d6f5e6; }
      .dim   { fill: #5f7a72; }
      .acc   { fill: #00ff9c; }
      .grid  { stroke: #18402f; stroke-width: 1; fill: none; }
      .ring  { stroke: #1f5740; stroke-width: 1; fill: none; }
      .wire  { stroke: #2a6a4d; stroke-width: 1.6; fill: none; }
      .acln  { stroke: #00ff9c; fill: none; }
      .blink { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .blink { animation: none; }
      }
    </style>
  </defs>

  <!-- self-contained panel so it survives on light theme too -->
  <rect x="0" y="0" width="880" height="240" rx="10" fill="url(#panel)"/>
  <rect x="0.5" y="0.5" width="879" height="239" rx="10" fill="none" stroke="#1c3b30" stroke-width="1"/>

  <!-- title bar -->
  <circle cx="20" cy="20" r="4.5" fill="#ff5f56"/>
  <circle cx="36" cy="20" r="4.5" fill="#ffbd2e"/>
  <circle cx="52" cy="20" r="4.5" fill="#27c93f"/>
  <text x="70" y="24" class="dim" font-size="13">yusen@vector-os : ~/robots</text>
  <text x="770" y="24" class="acc" font-size="13">[ ONLINE ]<tspan class="blink">_</tspan></text>
  <line x1="14" y1="34" x2="866" y2="34" stroke="#143028" stroke-width="1"/>

  <!-- ================= LIDAR / RADAR (left) ================= -->
  <g clip-path="url(#radarClip)">
    <circle cx="120" cy="130" r="84" fill="#07120d"/>
    <circle cx="120" cy="130" r="28" class="ring"/>
    <circle cx="120" cy="130" r="56" class="ring"/>
    <circle cx="120" cy="130" r="84" class="ring"/>
    <line x1="36" y1="130" x2="204" y2="130" class="grid"/>
    <line x1="120" y1="46" x2="120" y2="214" class="grid"/>
    <!-- rotating sweep wedge: a ~40deg trailing wedge behind the leading beam -->
    <g>
      <path d="M120 130 L120 46 A84 84 0 0 0 66 100 Z" fill="url(#sweep)"/>
      <line x1="120" y1="130" x2="120" y2="46" class="acln" stroke-width="1.4"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0 120 130" to="360 120 130" dur="3.6s" repeatCount="indefinite"/>
    </g>
    <!-- detected returns: fade in as the beam passes, then linger -->
    <circle cx="156" cy="96" r="3" class="acc">
      <animate attributeName="opacity" values="0;1;1;0.25" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="92" cy="170" r="2.4" class="acc">
      <animate attributeName="opacity" values="0;0;1;1;0.2" dur="3.6s" begin="-1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="158" r="2.4" class="acc">
      <animate attributeName="opacity" values="0;0;0;1;1;0.2" dur="3.6s" begin="-2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="84" cy="104" r="2" class="acc">
      <animate attributeName="opacity" values="0;1;1;0.2" dur="3.6s" begin="-0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="120" y="232" text-anchor="middle" class="dim" font-size="13">LIDAR - NAV2 - SLAM</text>

  <!-- ================= PIPELINE (center) ================= -->
  <g transform="translate(252 58)">
    <text x="0" y="0" class="dim" font-size="13">NL GOAL -> DECOMPOSE -> PLAN -> CONTROL</text>

    <!-- connectors (painted first, under the packet) -->
    <g class="wire">
      <line x1="70"  y1="27" x2="96"  y2="27"/>
      <line x1="180" y1="27" x2="206" y2="27"/>
      <line x1="270" y1="27" x2="296" y2="27"/>
    </g>

    <!-- packet travelling the pipeline: painted over the connectors but UNDER the
         node boxes, so it rides the wires and disappears beneath the labels -->
    <circle r="3" class="acc">
      <animate attributeName="cx" values="70;96;180;206;270;296;380" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="27" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;1;1;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <!-- nodes (painted last so their filled boxes occlude the packet) -->
    <g font-size="13">
      <rect x="0"   y="14" width="70" height="26" rx="4" fill="#0c1c16" stroke="#2a6a4d"/>
      <text x="35"  y="32" text-anchor="middle" class="ink">"fetch"</text>

      <rect x="96"  y="14" width="84" height="26" rx="4" fill="#0c1c16" stroke="#2a6a4d"/>
      <text x="138" y="32" text-anchor="middle" class="ink">decompose</text>

      <rect x="206" y="14" width="64" height="26" rx="4" fill="#0c1c16" stroke="#2a6a4d"/>
      <text x="238" y="32" text-anchor="middle" class="ink">plan</text>

      <rect x="296" y="14" width="84" height="26" rx="4" fill="#0c1c16" stroke="#2a6a4d"/>
      <text x="338" y="32" text-anchor="middle" class="ink">control</text>
    </g>

    <!-- telemetry bars (single bar — the other was redundant; this widens the lane) -->
    <g transform="translate(0 64)" font-size="13">
      <text x="0" y="8" class="dim">policy_hz</text>
      <rect x="84" y="0" width="296" height="8" rx="2" fill="#0c1c16" stroke="#1f5740"/>
      <rect x="84" y="0" height="8" rx="2" class="acc" opacity="0.85">
        <animate attributeName="width" values="120;288;180;296;150" dur="4.2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="0" y="98" class="dim" font-size="13">sim2real: <tspan class="acc">MuJoCo -> hardware</tspan>  |  no fine-tune NL control</text>
  </g>

  <!-- ================= QUADRUPED GAIT (right) ================= -->
  <g transform="translate(712 92)">
    <text x="55" y="-30" text-anchor="middle" class="dim" font-size="13">QUADRUPED GAIT</text>
    <!-- body -->
    <rect x="14" y="0" width="90" height="20" rx="5" class="acln" stroke-width="2" fill="#0c1c16"/>
    <!-- head (butts against the body, no overlap) -->
    <rect x="104" y="-4" width="20" height="16" rx="3" class="acln" stroke-width="2" fill="#0c1c16"/>
    <circle cx="117" cy="3" r="2" class="acc"/>
    <!-- trot gait: diagonal leg pairs swing in antiphase.
         hips fixed on the body; feet oscillate (lift + stride). -->
    <!-- front-left + rear-right (pair A) -->
    <g class="acln" stroke-width="2">
      <line x1="24" y1="20" x2="24" y2="40">
        <animate attributeName="x2" values="18;30;18" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="40;33;40" dur="0.7s" repeatCount="indefinite"/>
      </line>
      <line x1="96" y1="20" x2="96" y2="40">
        <animate attributeName="x2" values="90;102;90" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="40;33;40" dur="0.7s" repeatCount="indefinite"/>
      </line>
    </g>
    <!-- front-right + rear-left (pair B): value lists are already the inverse of
         pair A's, so with NO begin offset the pairs run in true antiphase
         (one diagonal pair in stance while the other swings) -->
    <g class="acln" stroke-width="2" opacity="0.78">
      <line x1="40" y1="20" x2="40" y2="40">
        <animate attributeName="x2" values="46;34;46" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="33;40;33" dur="0.7s" repeatCount="indefinite"/>
      </line>
      <line x1="80" y1="20" x2="80" y2="40">
        <animate attributeName="x2" values="86;74;86" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="33;40;33" dur="0.7s" repeatCount="indefinite"/>
      </line>
    </g>
    <!-- ground line -->
    <line x1="-6" y1="44" x2="132" y2="44" stroke="#1f5740" stroke-width="1"/>
    <text x="60" y="60" text-anchor="middle" class="acc" font-size="13">Go2 + arm  WBC</text>
  </g>

  <!-- joint-state ticker: fills the lower-right band; baseline shared with the
       lidar caption (y=232) so the bottom edge reads as one row -->
  <g font-size="13" text-anchor="middle" class="dim">
    <text x="767" y="232">q = [ 0.12 -0.43  0.88 ]<animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.46;0.5;0.96;1" dur="2.4s" repeatCount="indefinite"/></text>
    <text x="767" y="232" opacity="0">q = [ 0.14 -0.41  0.86 ]<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.5;0.96;1" dur="2.4s" repeatCount="indefinite"/></text>
  </g>

  <!-- ================= SCANLINES overlay ================= -->
  <g opacity="0.06" fill="#7dffce">
    <rect x="0" y="40"  width="880" height="1"/>
    <rect x="0" y="44"  width="880" height="1"/>
    <rect x="0" y="48"  width="880" height="1"/>
    <rect x="0" y="52"  width="880" height="1"/>
    <rect x="0" y="56"  width="880" height="1"/>
    <rect x="0" y="60"  width="880" height="1"/>
    <rect x="0" y="64"  width="880" height="1"/>
    <rect x="0" y="68"  width="880" height="1"/>
    <rect x="0" y="72"  width="880" height="1"/>
    <rect x="0" y="76"  width="880" height="1"/>
    <rect x="0" y="80"  width="880" height="1"/>
    <rect x="0" y="84"  width="880" height="1"/>
    <rect x="0" y="88"  width="880" height="1"/>
    <rect x="0" y="92"  width="880" height="1"/>
    <rect x="0" y="96"  width="880" height="1"/>
    <rect x="0" y="100" width="880" height="1"/>
    <rect x="0" y="104" width="880" height="1"/>
    <rect x="0" y="108" width="880" height="1"/>
    <rect x="0" y="112" width="880" height="1"/>
    <rect x="0" y="116" width="880" height="1"/>
    <rect x="0" y="120" width="880" height="1"/>
    <rect x="0" y="124" width="880" height="1"/>
    <rect x="0" y="128" width="880" height="1"/>
    <rect x="0" y="132" width="880" height="1"/>
    <rect x="0" y="136" width="880" height="1"/>
    <rect x="0" y="140" width="880" height="1"/>
    <rect x="0" y="144" width="880" height="1"/>
    <rect x="0" y="148" width="880" height="1"/>
    <rect x="0" y="152" width="880" height="1"/>
    <rect x="0" y="156" width="880" height="1"/>
    <rect x="0" y="160" width="880" height="1"/>
    <rect x="0" y="164" width="880" height="1"/>
    <rect x="0" y="168" width="880" height="1"/>
    <rect x="0" y="172" width="880" height="1"/>
    <rect x="0" y="176" width="880" height="1"/>
    <rect x="0" y="180" width="880" height="1"/>
    <rect x="0" y="184" width="880" height="1"/>
    <rect x="0" y="188" width="880" height="1"/>
    <rect x="0" y="192" width="880" height="1"/>
    <rect x="0" y="196" width="880" height="1"/>
  </g>
  <!-- moving scan bar -->
  <rect x="0" width="880" height="22" fill="#00ff9c" opacity="0.05">
    <animate attributeName="y" values="36;200;36" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
