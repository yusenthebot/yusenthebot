<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340" role="img" aria-label="vector-os live telemetry HUD: lidar radar sweep, joint telemetry waveforms, trot gait phase bars, agent kernel boot log, and the decompose-plan-verify-act pipeline with a traveling pulse">
  <title>vector-os // live telemetry — hand-rolled animated SVG, no JS</title>
  <style>
    .t { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    @keyframes hud-scroll { from { transform: translateX(0); } to { transform: translateX(-300px); } }
    .wave1 { animation: hud-scroll 6s linear infinite; }
    .wave2 { animation: hud-scroll 10s linear infinite; }
    @keyframes hud-blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    .blink { animation: hud-blink 1.1s steps(1) infinite; }
    @keyframes hud-dash { to { stroke-dashoffset: -16; } }
    .retry { animation: hud-dash 0.9s linear infinite; }
    @keyframes hud-scan { from { transform: translateY(0); } to { transform: translateY(390px); } }
    .scan { animation: hud-scan 8s linear infinite; }
  </style>

  <defs>
    <clipPath id="panel"><rect x="0" y="0" width="880" height="340" rx="10"/></clipPath>
    <clipPath id="wavebox"><rect x="250" y="54" width="300" height="120"/></clipPath>
  </defs>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="879" height="339" rx="10" fill="#0a0e14" stroke="#1f2d3a"/>

  <!-- title bar -->
  <circle cx="24" cy="19" r="5" fill="#ff5f56"/>
  <circle cx="42" cy="19" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="5" fill="#27c93f"/>
  <text class="t" x="78" y="23" font-size="11" fill="#9fb1c1">VECTOR-OS // LIVE TELEMETRY</text>
  <circle class="blink" cx="714" cy="19" r="3.5" fill="#00ff9c"/>
  <text class="t" x="856" y="23" font-size="10" fill="#00a86b" text-anchor="end">LINK: GO2 + SO-ARM101</text>
  <line x1="12" y1="34" x2="868" y2="34" stroke="#14202b"/>

  <!-- column separators -->
  <line x1="242" y1="46" x2="242" y2="226" stroke="#111c26"/>
  <line x1="560" y1="46" x2="560" y2="226" stroke="#111c26"/>

  <!-- ===== left: lidar radar ===== -->
  <g>
    <circle cx="130" cy="130" r="24" fill="none" stroke="#1b2c3a"/>
    <circle cx="130" cy="130" r="48" fill="none" stroke="#1b2c3a"/>
    <circle cx="130" cy="130" r="72" fill="none" stroke="#1b2c3a"/>
    <line x1="58" y1="130" x2="202" y2="130" stroke="#14202b"/>
    <line x1="130" y1="58" x2="130" y2="202" stroke="#14202b"/>
    <g>
      <path d="M130,130 L130,58 A72,72 0 0 1 166,67.7 Z" fill="#00ff9c" opacity="0.12"/>
      <line x1="130" y1="130" x2="130" y2="58" stroke="#00ff9c" stroke-width="1.5" opacity="0.85"/>
      <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="158" cy="102" r="3" fill="#00ff9c">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.55;1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="118" cy="168" r="3" fill="#00ff9c">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.55;1" dur="4s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="86" cy="112" r="2.5" fill="#ffb454">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.55;1" dur="4s" begin="3.2s" repeatCount="indefinite"/>
    </circle>
    <text class="t" x="130" y="222" font-size="10" fill="#5c7287" text-anchor="middle">lidar // slam :: 3 tracks</text>
  </g>

  <!-- ===== middle: joint telemetry ===== -->
  <text class="t" x="250" y="50" font-size="10" fill="#5c7287">joint telemetry // 50 hz</text>
  <g stroke="#111c26">
    <line x1="250" y1="90" x2="550" y2="90"/>
    <line x1="250" y1="145" x2="550" y2="145"/>
    <line x1="325" y1="56" x2="325" y2="172"/>
    <line x1="400" y1="56" x2="400" y2="172"/>
    <line x1="475" y1="56" x2="475" y2="172"/>
  </g>
  <g clip-path="url(#wavebox)">
    <g transform="translate(250,90)">
      <g class="wave1" fill="none" stroke="#00ff9c" stroke-width="1.5">
        <path d="M0,0 H18 L24,-16 L30,16 L36,0 H58 L64,-8 L72,6 L80,0 H118 L124,-16 L130,16 L136,0 H158 L164,-8 L172,6 L180,0 H218 L224,-16 L230,16 L236,0 H258 L264,-8 L272,6 L280,0 H300"/>
        <path transform="translate(300,0)" d="M0,0 H18 L24,-16 L30,16 L36,0 H58 L64,-8 L72,6 L80,0 H118 L124,-16 L130,16 L136,0 H158 L164,-8 L172,6 L180,0 H218 L224,-16 L230,16 L236,0 H258 L264,-8 L272,6 L280,0 H300"/>
      </g>
    </g>
    <g transform="translate(250,145)">
      <g class="wave2" fill="none" stroke="#ffb454" stroke-width="1.2" opacity="0.8">
        <path d="M0,0 C12,-14 25,-14 37,0 C50,14 63,14 75,0 C87,-14 100,-14 112,0 C125,14 138,14 150,0 C162,-14 175,-14 187,0 C200,14 213,14 225,0 C237,-14 250,-14 262,0 C275,14 288,14 300,0"/>
        <path transform="translate(300,0)" d="M0,0 C12,-14 25,-14 37,0 C50,14 63,14 75,0 C87,-14 100,-14 112,0 C125,14 138,14 150,0 C162,-14 175,-14 187,0 C200,14 213,14 225,0 C237,-14 250,-14 262,0 C275,14 288,14 300,0"/>
      </g>
    </g>
  </g>

  <!-- gait phase bars: trot — diagonal pairs FL+RR and FR+RL in phase -->
  <text class="t" x="250" y="192" font-size="10" fill="#5c7287">gait: trot</text>
  <g fill="#00ff9c" opacity="0.85">
    <rect x="330" y="201" width="30" height="4">
      <animate attributeName="height" values="4;18;4" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="201;187;201" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="385" y="201" width="30" height="4">
      <animate attributeName="height" values="4;18;4" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="201;187;201" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="201" width="30" height="4">
      <animate attributeName="height" values="4;18;4" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="201;187;201" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="495" y="201" width="30" height="4">
      <animate attributeName="height" values="4;18;4" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="201;187;201" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g class="t" font-size="9" fill="#5c7287" text-anchor="middle">
    <text x="345" y="217">FL</text>
    <text x="400" y="217">FR</text>
    <text x="455" y="217">RL</text>
    <text x="510" y="217">RR</text>
  </g>

  <!-- ===== right: agent kernel boot log ===== -->
  <text class="t" x="576" y="50" font-size="10" fill="#5c7287">agent kernel // live</text>
  <g class="t" font-size="11">
    <text x="576" y="86" fill="#e6edf3"><tspan fill="#00ff9c">$</tspan> vector "fetch the bottle"
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.033;0.056;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="105" fill="#9fb1c1">decompose .... <tspan fill="#00ff9c">ok</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.133;0.156;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="124" fill="#9fb1c1">plan ......... <tspan fill="#00ff9c">ok</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.233;0.256;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="143" fill="#9fb1c1">verify ....... <tspan fill="#ffb454">retry(1)</tspan> <tspan fill="#00ff9c">ok</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.356;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="162" fill="#9fb1c1">act .......... <tspan fill="#00ff9c">wbc engaged</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.433;0.456;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="181" fill="#9fb1c1">grasp ........ <tspan fill="#00ff9c">secured</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.533;0.556;0.933;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="576" y="205" fill="#00ff9c">$</text>
  </g>
  <rect class="blink" x="590" y="196" width="7" height="11" fill="#00ff9c"/>

  <!-- ===== bottom: kernel pipeline with traveling pulse ===== -->
  <!-- pulse drawn before nodes so it tunnels under each stage -->
  <g stroke="#00a86b" stroke-width="1">
    <line x1="70" y1="259" x2="137" y2="259"/>
    <line x1="221" y1="259" x2="288" y2="259"/>
    <line x1="344" y1="259" x2="411" y2="259"/>
    <line x1="477" y1="259" x2="544" y2="259"/>
    <line x1="590" y1="259" x2="657" y2="259"/>
    <line x1="703" y1="259" x2="770" y2="259"/>
  </g>
  <g fill="#00a86b">
    <polygon points="131,255.5 137,259 131,262.5"/>
    <polygon points="282,255.5 288,259 282,262.5"/>
    <polygon points="405,255.5 411,259 405,262.5"/>
    <polygon points="538,255.5 544,259 538,262.5"/>
    <polygon points="651,255.5 657,259 651,262.5"/>
    <polygon points="764,255.5 770,259 764,262.5"/>
  </g>
  <circle r="3.5" fill="#00ff9c">
    <animateMotion path="M70,259 L770,259" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <g>
    <rect x="30" y="246" width="40" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
    <rect x="137" y="246" width="84" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
    <rect x="288" y="246" width="56" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
    <rect x="411" y="246" width="66" height="26" rx="4" fill="#0d1520" stroke="#ffb454"/>
    <rect x="544" y="246" width="46" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
    <rect x="657" y="246" width="46" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
    <rect x="770" y="246" width="78" height="26" rx="4" fill="#0d1520" stroke="#00c277"/>
  </g>
  <g class="t" font-size="10" fill="#00ff9c" text-anchor="middle">
    <text x="50" y="263">NL</text>
    <text x="179" y="263">DECOMPOSE</text>
    <text x="316" y="263">PLAN</text>
    <text x="444" y="263" fill="#ffb454">VERIFY</text>
    <text x="567" y="263">ACT</text>
    <text x="680" y="263">WBC</text>
    <text x="809" y="263">GO2+ARM</text>
  </g>
  <path class="retry" d="M444,272 C444,294 316,294 316,272" fill="none" stroke="#ffb454" stroke-dasharray="4 4" opacity="0.8"/>
  <polygon points="311,279 316,272 321,279" fill="#ffb454"/>
  <text class="t" x="380" y="296" font-size="9" fill="#ffb454" text-anchor="middle">retry</text>

  <!-- scanline -->
  <g clip-path="url(#panel)">
    <g class="scan">
      <rect x="0" y="-44" width="880" height="38" fill="#00ff9c" opacity="0.035"/>
    </g>
  </g>
</svg>
