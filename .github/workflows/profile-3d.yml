name: GitHub-Profile-3D-Contrib

# Generates the 3D isometric contribution calendar into profile-3d-contrib/
# and commits it back to main. The README references the committed SVGs, so
# there is no external service dependency after the first run.
#
# First-time setup: trigger once manually (Actions tab -> this workflow ->
# "Run workflow") so the SVGs exist before the README is viewed.

on:
  schedule:
    # 18:00 UTC daily
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    # The Action commits into profile-3d-contrib/ with GITHUB_TOKEN, which does
    # not re-trigger workflows today — but make the no-loop property explicit so
    # it survives a future switch to a PAT or a different bot identity.
    paths-ignore:
      - "profile-3d-contrib/**"

permissions:
  contents: write

# Avoid overlapping runs racing on the same commit
concurrency:
  group: profile-3d
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout
        # Pinned to the SHA of the stable v4.2.2 release for reproducibility.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate 3D contribution graph
        # Pinned to the commit SHA of the v0.9.2 release tag (supply-chain
        # safety: this job has contents: write, so no floating tags).
        uses: yoshi389111/github-profile-3d-contrib@5b718734e8da645411919f0ae9ab9e7f9377158f # v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          if git diff --staged --quiet; then
            echo "No changes to the 3D contribution graph."
          else
            git commit -m "chore: refresh 3D contribution graph"
            git push
          fi
